name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Syntax check
        run: python -m py_compile gmail_bulk_trash.py

      - name: Run tests
        run: python tests/test_senders.py

      - name: Type hints check
        run: |
          python << 'EOF'
          import ast
          with open('gmail_bulk_trash.py') as f:
              tree = ast.parse(f.read())
          errors = 0
          for node in ast.walk(tree):
              if isinstance(node, ast.FunctionDef):
                  if node.name not in ['install']:
                      if node.returns is None and node.name != 'manage_senders':
                          print(f"ERROR: Missing return type: {node.name}")
                          errors += 1
          exit(errors)
          EOF
