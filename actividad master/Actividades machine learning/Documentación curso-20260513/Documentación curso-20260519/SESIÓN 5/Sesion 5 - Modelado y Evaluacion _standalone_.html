  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

f; font-size: 24px; font-weight: 500; color: var(--ink); }\n\n  .big-num { position: absolute; top: 20px; right: 60px; font-family: 'Fraunces', serif; font-weight: 380; font-size: 720px; line-height: 0.78; letter-spacing: -0.05em; color: var(--accent); opacity: 0.18; pointer-events: none; z-index: 0; }\n\n  .divider-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }\n  .divider-title { font-family: 'Fraunces', serif; font-weight: 360; font-size: 196px; line-height: 0.95; letter-spacing: -0.03em; font-variation-settings: \"SOFT\" 30, \"opsz\" 144; color: var(--paper); margin: 0; text-wrap: balance; }\n\n  .placeholder { background: repeating-linear-gradient(135deg, transparent 0 8px, rgba(0,0,0,0.04) 8px 9px); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); text-align: center; padding: 24px; }\n\n  /* Compare table */\n  .comp-head { display: grid; border-bottom: 2px solid var(--ink-2); }\n  .comp-head > div { padding: 14px 22px; font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500; }\n\n  /* Analogy callout */\n  .analogy {\n    border-left: 4px solid var(--accent);\n    background: oklch(0.97 0.012 220);\n    padding: 28px 36px;\n    border-radius: 0 4px 4px 0;\n  }\n  .analogy .a-tag { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }\n  .analogy p { font-size: 26px; line-height: 1.5; color: var(--ink); margin: 0; }\n  .analogy p + p { margin-top: 12px; }\n\n  /* Code block */\n  .code {\n    background: oklch(0.15 0.04 274);\n    color: oklch(0.88 0.05 200);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 20px;\n    line-height: 1.7;\n    padding: 28px 32px;\n    border-radius: 4px;\n    overflow: hidden;\n    white-space: pre;\n  }\n  .code .cm { color: oklch(0.55 0.03 200); font-style: italic; }\n  .code .kw { color: oklch(0.78 0.16 320); }\n  .code .fn { color: var(--accent-2); }\n  .code .st { color: oklch(0.82 0.13 100); }\n  .code .nm { color: oklch(0.78 0.13 60); }\n  .code .var { color: oklch(0.92 0.04 200); }\n\n  /* Formula card with translation */\n  .formula-card {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 0;\n    border: 1px solid var(--rule); background: white;\n  }\n  .formula-card .fc-math {\n    background: oklch(0.15 0.04 274);\n    padding: 32px 36px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px; line-height: 2; color: oklch(0.88 0.05 200);\n    display: flex; flex-direction: column; justify-content: center;\n  }\n  .formula-card .fc-math .accent { color: var(--accent-2); }\n  .formula-card .fc-math .num { color: oklch(0.8 0.08 60); }\n  .formula-card .fc-words {\n    padding: 32px 36px;\n    display: flex; flex-direction: column; justify-content: center; gap: 12px;\n  }\n  .formula-card .fc-words .lbl { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }\n  .formula-card .fc-words p { font-size: 22px; line-height: 1.5; color: var(--ink-2); margin: 0; }\n\n  /* Checkpoint */\n  .checkpoint {\n    background: var(--primary); color: var(--paper);\n    padding: 32px 40px; border-radius: 4px;\n    display: grid; grid-template-columns: auto 1fr; gap: 36px; align-items: center;\n  }\n  .checkpoint .cp-num {\n    font-family: 'Fraunces', serif; font-size: 96px; line-height: 1; color: var(--accent);\n    font-variation-settings: \"SOFT\" 30, \"opsz\" 144;\n  }\n  .checkpoint .cp-q { font-family: 'Fraunces', serif; font-size: 36px; line-height: 1.2; color: var(--paper); margin: 0 0 8px 0; }\n  .checkpoint .cp-a { font-size: 22px; color: var(--accent-2); margin: 0; }\n\n  /* Interactive controls */\n  .ix-frame {\n    background: white; border: 1.5px solid var(--rule); border-radius: 4px;\n    padding: 28px 32px;\n    display: flex; flex-direction: column; gap: 18px;\n  }\n  .ix-frame .ix-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin: 0; }\n  .ix-row { display: grid; grid-template-columns: 160px 1fr 80px; align-items: center; gap: 18px; font-family: 'JetBrains Mono', monospace; font-size: 18px; }\n  .ix-row label { color: var(--ink-2); }\n  .ix-row .ix-val { text-align: right; color: var(--primary); font-weight: 600; }\n  input[type=range] {\n    -webkit-appearance: none; appearance: none;\n    width: 100%; height: 4px; background: var(--rule); border-radius: 2px; outline: none;\n  }\n  input[type=range]::-webkit-slider-thumb {\n    -webkit-appearance: none; appearance: none;\n    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);\n    cursor: pointer; border: 3px solid white; box-shadow: 0 0 0 1px var(--accent);\n  }\n  input[type=range]::-moz-range-thumb {\n    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);\n    cursor: pointer; border: 3px solid white; box-shadow: 0 0 0 1px var(--accent);\n  }\n  .ix-btn {\n    border: 1.5px solid var(--rule); background: white;\n    padding: 12px 18px; cursor: pointer;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--ink-2);\n    border-radius: 2px;\n    transition: all 0.15s;\n  }\n  .ix-btn:hover { background: var(--paper-2); }\n  .ix-btn.active { background: var(--primary); color: var(--paper); border-color: var(--primary); }\n  .ix-btn.accent.active { background: var(--accent); border-color: var(--accent); }\n\n  /* DataFrame table */\n  .df {\n    border-collapse: collapse;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 18px;\n    background: white;\n    width: 100%;\n  }\n  .df th, .df td {\n    border: 1px solid var(--rule);\n    padding: 10px 14px;\n    text-align: left;\n  }\n  .df th {\n    background: oklch(0.92 0.02 274);\n    font-weight: 500;\n    color: var(--ink);\n    font-size: 14px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n  }\n  .df td.idx { background: oklch(0.95 0.01 274); color: var(--ink-3); font-weight: 500; }\n  .df td.nan { background: oklch(0.92 0.08 30); color: var(--warn); font-style: italic; }\n  .df td.fixed { background: oklch(0.92 0.08 160); color: var(--ok); }\n  .df td.outlier { background: oklch(0.94 0.10 30); color: var(--warn); font-weight: 600; }\n\n  /* Quiz card */\n  .quiz-card {\n    background: white; border: 1px solid var(--rule); padding: 28px 32px;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .quiz-card.right { border-color: var(--ok); background: oklch(0.97 0.04 160); }\n  .quiz-card.wrong { border-color: var(--warn); background: oklch(0.97 0.04 30); }\n  .quiz-q { font-family: 'Fraunces', serif; font-size: 30px; line-height: 1.2; color: var(--ink); margin: 0; }\n  .quiz-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }\n  .quiz-options .ix-btn { padding: 12px 8px; font-size: 12px; }\n  .quiz-feedback { font-size: 20px; line-height: 1.4; min-height: 28px; }\n  .quiz-feedback.right { color: var(--ok); }\n  .quiz-feedback.wrong { color: var(--warn); }\n\n  /* Source pill */\n  .src-pill {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 10px 18px;\n    border: 1.5px solid var(--rule); background: white;\n    border-radius: 999px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--ink-2);\n  }\n  .src-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }\n\n  /* Distribution plot */\n  .dist {\n    background: white; border: 1px solid var(--rule); padding: 16px;\n  }\n\n  /* Outlier scale visual */\n  .scale-bar {\n    position: relative; height: 12px; background: var(--paper-2);\n    border-radius: 6px; margin: 18px 0;\n  }\n  .scale-bar .iqr-zone { position: absolute; height: 100%; background: var(--accent); opacity: 0.3; border-radius: 6px; }\n  .scale-bar .pt { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--ink-2); top: -1px; transform: translateX(-50%); }\n  .scale-bar .pt.out { background: var(--warn); }\n\n  /* Dot grid bg */\n  .dot-grid { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(25,15,120,0.06) 1px, transparent 1.5px); background-size: 36px 36px; pointer-events: none; }\n  section.dark .dot-grid { background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1.5px); }\n\n  /* Person portrait placeholder */\n  .portrait-frame {\n    aspect-ratio: 3/4;\n    background: linear-gradient(135deg, oklch(0.85 0.04 220) 0%, oklch(0.78 0.06 250) 100%);\n    border: 1px solid var(--rule);\n    position: relative;\n    overflow: hidden;\n  }\n  .portrait-frame::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: repeating-linear-gradient(45deg, transparent 0 14px, rgba(255,255,255,0.06) 14px 15px);\n  }\n  .portrait-mono {\n    position: absolute; bottom: 18px; left: 22px; right: 22px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--paper);\n    z-index: 2;\n  }\n  .portrait-svg { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n  /* Timeline */\n  .timeline { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; position: relative; padding-top: 40px; }\n  .timeline::before { content: \"\"; position: absolute; top: 60px; left: 6%; right: 6%; height: 2px; background: var(--rule); }\n  .tl-item { display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; padding: 0 8px; }\n  .tl-year { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.12em; color: var(--accent); font-weight: 600; }\n  .tl-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 3px solid var(--paper-2); z-index: 2; }\n  .tl-text { text-align: center; font-size: 16px; line-height: 1.3; color: var(--ink-2); margin-top: 8px; }\n\n  /* Pipeline arrows */\n  .pipeline {\n    display: grid; grid-template-columns: 1fr 24px 1fr 24px 1fr 24px 1fr;\n    align-items: stretch; gap: 0;\n  }\n  .pipe-step {\n    background: white; border: 1.5px solid var(--rule); padding: 22px 18px;\n    display: flex; flex-direction: column; gap: 8px; min-height: 130px;\n  }\n  .pipe-step .pn { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary); }\n  .pipe-step h5 { font-family: 'Fraunces', serif; font-weight: 450; font-size: 22px; line-height: 1.15; margin: 0; color: var(--ink); }\n  .pipe-step p { font-size: 16px; line-height: 1.4; color: var(--ink-2); margin: 0; }\n  .pipe-arrow { display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 22px; }\n  .pipe-step.active { border-color: var(--accent); border-width: 2px; background: oklch(0.97 0.02 220); }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 01 — Portada -->\n  <section class=\"slide cream\" data-screen-label=\"01 Portada\">\n    <div class=\"chrome-top\">\n      <div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv>\n      <span>Máster IA · UNIR · Sesión 05<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"cover-grid\">\n        <div>\n          <div class=\"label-accent\" style=\"margin-bottom: 32px;\">Tema 05 · Estrategia del Dato, ML &amp; DL<\u002Fdiv>\n          <h1 class=\"display\">Modelado<br>y <em>evaluación<\u002Fem><br>de modelos.<\u002Fh1>\n        <\u002Fdiv>\n        <div>\n          <p class=\"lead\" style=\"margin-bottom: 56px;\">Elegir el algoritmo, entrenarlo, medir si funciona y afinarlo. La parte que sale en LinkedIn.<\u002Fp>\n          <dl class=\"cover-meta\">\n            <dt>Asignatura<\u002Fdt><dd>Estrategia del Dato, ML y DL<\u002Fdd>\n            <dt>Tema<\u002Fdt><dd>05 · Modelado y Evaluación<\u002Fdd>\n            <dt>Duración<\u002Fdt><dd>120 minutos<\u002Fdd>\n            <dt>Sesión<\u002Fdt><dd>05 / 07<\u002Fdd>\n          <\u002Fdl>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 — Agenda -->\n  <section class=\"slide\" data-screen-label=\"02 Agenda\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Agenda · 05<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">Lo que veremos hoy<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 48px;\">Dos bloques. Una clase.<br>De los datos al <em>modelo afinado<\u002Fem>.<\u002Fh2>\n      <div class=\"two-col\" style=\"flex: 1;\">\n        <div>\n          <div class=\"label\" style=\"border-top: 2px solid var(--ink); padding-top: 18px; margin-bottom: 18px;\">Bloque I · 60 min · Elegir y entrenar<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li>Tipos de problema: regresión, clasificación, clustering<\u002Fli>\n            <li>El mapa de <em>scikit-learn<\u002Fem>: el GPS del modelado<\u002Fli>\n            <li>Entrenar un modelo: el ritual <em>fit / predict<\u002Fem><\u002Fli>\n            <li>El sobreajuste: el empollón que no entiende<\u002Fli>\n            <li>Particiones: <em>train · val · test<\u002Fem><\u002Fli>\n            <li>Validación cruzada (k-fold)<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"border-top: 2px solid var(--accent); padding-top: 18px; margin-bottom: 18px;\">Bloque II · 60 min · Medir y refinar<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li>Métricas de regresión: <em>MAE, MSE, RMSE, R²<\u002Fem><\u002Fli>\n            <li>Métricas de clasificación: <em>matriz de confusión<\u002Fem><\u002Fli>\n            <li>Métricas de clustering: silueta, Davies-Bouldin<\u002Fli>\n            <li>Parámetros vs hiperparámetros<\u002Fli>\n            <li>Gradiente descendente · <em>GridSearchCV<\u002Fem><\u002Fli>\n            <li>Quiz: ¿qué métrica usarías?<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 — Dónde estamos en el pipeline -->\n  <section class=\"slide cream\" data-screen-label=\"03 Donde Estamos\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>El mapa de la clase<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">El ciclo de vida del machine learning<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 48px;\">Hoy entramos en la <em>cocina<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 40px; max-width: 1500px;\">En la sesión 4 limpiamos los datos. Hoy los usamos para entrenar y evaluar modelos. Después los pondremos en producción.<\u002Fp>\n      <div class=\"pipeline\" style=\"margin-top: 24px;\">\n        <div class=\"pipe-step\"><div class=\"pn\">01 · S03/S04<\u002Fdiv><h5>Recopilar datos<\u002Fh5><p>Fuentes, formatos, cargar.<\u002Fp><\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-step\"><div class=\"pn\">02 · S04<\u002Fdiv><h5>Preprocesar<\u002Fh5><p>NaN, outliers, escalado, encoding.<\u002Fp><\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-step active\"><div class=\"pn\" style=\"color: var(--accent);\">03 · HOY<\u002Fdiv><h5>Entrenar y evaluar<\u002Fh5><p>Elegir modelo, métricas, validar.<\u002Fp><\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-step\"><div class=\"pn\">04 · S06/S07<\u002Fdiv><h5>Desplegar<\u002Fh5><p>Producción y monitorización.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"body-sm\" style=\"margin-top: 40px; font-size: 22px; max-width: 1500px;\">Cada paso depende del anterior. Si la sesión 4 falla, este modelo será malo por mucho que afinemos.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 — Divider Bloque I -->\n  <section class=\"slide dark\" data-screen-label=\"04 Bloque I\">\n    <div class=\"dot-grid\"><\u002Fdiv>\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I<\u002Fspan><\u002Fdiv>\n    <div class=\"body\" style=\"justify-content: center;\">\n      <div class=\"divider-num\" style=\"margin-bottom: 32px;\">Bloque · 01<\u002Fdiv>\n      <h1 class=\"divider-title\">Elegir y<br><em>entrenar<\u002Fem>.<\u002Fh1>\n      <p class=\"lead\" style=\"margin-top: 48px; max-width: 1100px;\">No hay un único algoritmo. La elección depende del problema, de los datos y de qué quieres optimizar.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 — Tipos de problema -->\n  <section class=\"slide\" data-screen-label=\"05 Tipo Problema\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Selección<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.2 · El primer cruce de caminos<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">¿Qué tipo de <em>problema<\u002Fem> tienes?<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">Antes de elegir algoritmo, hay que saber qué quieres que el modelo haga. Hay tres grandes familias.<\u002Fp>\n      <div class=\"three-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Regresión<\u002Fdiv>\n          <h4>Predigo un <em>número<\u002Fem><\u002Fh4>\n          <p>Precio de un piso, temperatura, nota del examen, peso de un bebé.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3);\">Salida continua: 0.0, 42.7, 1.250.000…<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Clasificación<\u002Fdiv>\n          <h4>Predigo una <em>etiqueta<\u002Fem><\u002Fh4>\n          <p>Spam o no spam, baja o no baja, qué especie de planta, qué emoción muestra una cara.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3);\">Salida discreta: 2 o más categorías.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">Clustering<\u002Fdiv>\n          <h4>Descubro <em>grupos<\u002Fem><\u002Fh4>\n          <p>Segmentar clientes, agrupar pacientes con síntomas parecidos, sin etiquetas previas.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3);\">No supervisado: el modelo se las arregla solo.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\" style=\"margin-top: 32px;\">\n        <div class=\"a-tag\">Regla mnemotécnica<\u002Fdiv>\n        <p>¿La respuesta es un <strong>número<\u002Fstrong>? Regresión. ¿Una <strong>caja<\u002Fstrong>? Clasificación. ¿No tienes respuesta y quieres <strong>descubrirla<\u002Fstrong>? Clustering.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 — Mapa scikit-learn -->\n  <section class=\"slide cream\" data-screen-label=\"06 Mapa Sklearn\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Selección<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.2 · El GPS del modelado<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">El <em>mapa<\u002Fem> de scikit-learn.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">Scikit-learn publica un diagrama de flujo: respondes 4-5 preguntas sobre tus datos y te dice por qué algoritmo empezar. No es la verdad absoluta, pero <em>te ahorra horas<\u002Fem>.<\u002Fp>\n      <div style=\"flex: 1; display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px; align-items: start;\">\n        <div style=\"background: white; border: 1px solid var(--rule); padding: 28px 32px;\">\n          <div class=\"label\" style=\"color: var(--primary); margin-bottom: 18px;\">Ejemplo · Dataset Iris<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 18px;\">\n            <div style=\"display: flex; gap: 14px; align-items: center;\"><span style=\"background: var(--accent); color: white; padding: 4px 10px; border-radius: 2px; font-size: 13px;\">START<\u002Fspan><span style=\"color: var(--ink-2);\">→<\u002Fspan><span style=\"color: var(--ink);\">¿&gt;50 muestras?<\u002Fspan><span style=\"color: var(--ok);\">SÍ<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 14px; align-items: center;\"><span style=\"color: var(--ink-3); width: 60px;\">↓<\u002Fspan><span style=\"color: var(--ink);\">¿Predigo una categoría?<\u002Fspan><span style=\"color: var(--ok);\">SÍ<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 14px; align-items: center;\"><span style=\"color: var(--ink-3); width: 60px;\">↓<\u002Fspan><span style=\"color: var(--ink);\">¿Datos etiquetados?<\u002Fspan><span style=\"color: var(--ok);\">SÍ<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 14px; align-items: center;\"><span style=\"color: var(--ink-3); width: 60px;\">↓<\u002Fspan><span style=\"color: var(--ink);\">¿&lt;100k muestras?<\u002Fspan><span style=\"color: var(--ok);\">SÍ<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 14px; align-items: center; margin-top: 8px;\"><span style=\"background: var(--primary); color: white; padding: 8px 14px; border-radius: 2px;\">Probar Linear SVC<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Cómo se usa<\u002Fdiv>\n          <ol style=\"padding-left: 24px; font-size: 22px; line-height: 1.55; color: var(--ink-2); margin: 0;\">\n            <li style=\"margin-bottom: 10px;\">Empiezas en START.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Sigues las flechas según tus respuestas.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Llegas a un primer algoritmo: <em>pruébalo<\u002Fem>.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">¿No funciona? Sigue la flecha al siguiente.<\u002Fli>\n            <li>Si funciona, prueba 2-3 más y compara.<\u002Fli>\n          <\u002Fol>\n          <div class=\"analogy\" style=\"margin-top: 22px;\">\n            <div class=\"a-tag\">Aviso<\u002Fdiv>\n            <p style=\"font-size: 22px;\">Es una guía aproximada, no un oráculo. Hay decenas de algoritmos que no aparecen.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 — Datos: cantidad y calidad -->\n  <section class=\"slide\" data-screen-label=\"07 Datos Cantidad Calidad\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Selección<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.2 · ¿Cuántos datos hacen falta?<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Cantidad <em>y<\u002Fem> calidad.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">No hay cifra mágica, pero conviene pensar en <em>miles<\u002Fem> de ejemplos como mínimo. Y lo que importa tanto como cuántos: que estén bien etiquetados y representen lo que pasa en la realidad.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start;\">\n        <div>\n          <div class=\"label\" style=\"color: var(--primary); margin-bottom: 16px;\">Cantidad · Orden de magnitud<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li>Regresión lineal simple: <em>cientos<\u002Fem> bastan<\u002Fli>\n            <li>Random Forest, SVM: <em>miles<\u002Fem><\u002Fli>\n            <li>Deep Learning: <em>decenas o cientos de miles<\u002Fem><\u002Fli>\n            <li>Transformers grandes: <em>millones / billones<\u002Fem><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"color: var(--accent); margin-bottom: 16px;\">Calidad · Lo que de verdad importa<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li>Etiquetas correctas (sin errores humanos)<\u002Fli>\n            <li>Representatividad: tu muestra parece la realidad<\u002Fli>\n            <li>Sin sesgos sistemáticos<\u002Fli>\n            <li>Variables relevantes para el problema<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\" style=\"margin-top: 32px;\">\n        <div class=\"a-tag\">Analogía · Enseñar a un niño qué es un perro<\u002Fdiv>\n        <p>Si solo le enseñas <strong>fotos de golden retriever<\u002Fstrong>, llamará «no-perro» a un chihuahua. <em>10.000 fotos del mismo perro no son mejor que 200 fotos de razas variadas.<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 — El ritual fit / predict -->\n  <section class=\"slide cream\" data-screen-label=\"08 Fit Predict\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Entrenamiento<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · El ritual de tres pasos<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Cargar, <em>fit<\u002Fem>, <em>predict<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">Lo bonito de scikit-learn: <strong>todos<\u002Fstrong> los algoritmos se entrenan igual. Cambias una línea (el nombre del modelo) y el resto es idéntico.<\u002Fp>\n      <div class=\"pipeline\" style=\"margin-bottom: 32px;\">\n        <div class=\"pipe-step active\"><div class=\"pn\" style=\"color: var(--accent);\">01<\u002Fdiv><h5>Importar y cargar<\u002Fh5><p>from sklearn.svm import LinearSVC<br>X, y = load_iris(...)<\u002Fp><\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-step\"><div class=\"pn\">02<\u002Fdiv><h5>Instanciar<\u002Fh5><p>model = LinearSVC(<br>&nbsp;&nbsp;random_state=42)<\u002Fp><\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-step\"><div class=\"pn\">03<\u002Fdiv><h5>Entrenar<\u002Fh5><p>model.fit(X, y)<\u002Fp><\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-step\"><div class=\"pn\">04<\u002Fdiv><h5>Predecir<\u002Fh5><p>model.predict(X_new)<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\">\n        <div class=\"a-tag\">Analogía · La receta del cocinero<\u002Fdiv>\n        <p><strong>fit()<\u002Fstrong> es leer la receta y practicarla 1.000 veces. <strong>predict()<\u002Fstrong> es cocinar el plato delante del cliente. Una vez aprendido, lo haces siempre igual.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 — Iris en código -->\n  <section class=\"slide\" data-screen-label=\"09 Codigo Iris\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Entrenamiento<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · El «hola mundo» del ML<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">El dataset <em>Iris<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 24px; max-width: 1500px;\">150 flores, 3 especies, 4 medidas (sépalo y pétalo). El ejercicio canónico que sale en todos los manuales. Lo veréis en cada vídeo y cada libro.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start; gap: 56px;\">\n        <div>\n          <div class=\"label\" style=\"color: var(--primary); margin-bottom: 14px;\">Código mínimo<\u002Fdiv>\n          <div class=\"code\" style=\"font-size: 18px;\"><span class=\"kw\">from<\u002Fspan> sklearn.datasets <span class=\"kw\">import<\u002Fspan> load_iris\n<span class=\"kw\">from<\u002Fspan> sklearn.svm <span class=\"kw\">import<\u002Fspan> LinearSVC\n\ndata = <span class=\"fn\">load_iris<\u002Fspan>()\nX, y = data.data, data.target\n\nmodel = <span class=\"fn\">LinearSVC<\u002Fspan>(random_state=<span class=\"nm\">42<\u002Fspan>)\nmodel.<span class=\"fn\">fit<\u002Fspan>(X, y)\n\nX_new = [[<span class=\"nm\">5.1<\u002Fspan>, <span class=\"nm\">3.5<\u002Fspan>, <span class=\"nm\">1.4<\u002Fspan>, <span class=\"nm\">0.2<\u002Fspan>]]\nmodel.<span class=\"fn\">predict<\u002Fspan>(X_new)\n<span class=\"cm\"># → array([0])  → setosa<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Qué pasa por dentro<\u002Fdiv>\n          <ol style=\"padding-left: 24px; font-size: 22px; line-height: 1.55; color: var(--ink-2); margin: 0;\">\n            <li style=\"margin-bottom: 10px;\">Cargamos las 150 flores.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Las dividimos: <em>X<\u002Fem> = medidas, <em>y<\u002Fem> = especie.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Creamos un Linear SVC.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\"><em>fit<\u002Fem>: el modelo busca la frontera que separa especies.<\u002Fli>\n            <li><em>predict<\u002Fem>: le damos una flor nueva, devuelve su especie.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top: 22px; padding: 16px 20px; background: oklch(0.97 0.012 220); border-left: 3px solid var(--accent);\">\n            <p class=\"body-sm\" style=\"font-size: 21px;\"><strong>random_state=42<\u002Fstrong> · garantiza que el resultado sea el mismo cada vez que ejecutas. Cualquier número vale, 42 es la <em>broma<\u002Fem> del oficio.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 — El sobreajuste -->\n  <section class=\"slide cream\" data-screen-label=\"10 Sobreajuste\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · El gran peligro<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · El enemigo número uno<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">El <em>sobreajuste<\u002Fem>: el empollón que no entiende.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">Un modelo sobreajustado (<em>overfitting<\u002Fem>) memoriza los datos de entrenamiento al milímetro, pero se hunde cuando llegan datos nuevos. <strong>Ha aprendido el libro, no la asignatura.<\u002Fstrong><\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--warn); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--warn);\">El empollón<\u002Fdiv>\n          <h4>Sobreajuste · Overfitting<\u002Fh4>\n          <p>Se sabe los ejercicios del libro al dedillo, palabra por palabra.<\u002Fp>\n          <p>En el examen le ponen un problema <em>parecido pero distinto<\u002Fem> y se queda en blanco.<\u002Fp>\n          <p style=\"font-size: 20px; color: var(--ink-3);\">→ 100 % en train, 60 % en test.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--ok); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">El que entiende<\u002Fdiv>\n          <h4>Generalización<\u002Fh4>\n          <p>No se sabe cada ejercicio, pero <strong>ha entendido el concepto<\u002Fstrong>.<\u002Fp>\n          <p>En el examen le ponen lo que sea y razona la respuesta.<\u002Fp>\n          <p style=\"font-size: 20px; color: var(--ink-3);\">→ 85 % en train, 84 % en test.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\" style=\"margin-top: 28px;\">\n        <div class=\"a-tag\">Cómo detectarlo<\u002Fdiv>\n        <p>Si el modelo acierta <strong>casi todo<\u002Fstrong> en entrenamiento pero falla en datos nuevos: tienes sobreajuste. Por eso <em>siempre<\u002Fem> hay que reservar datos que el modelo nunca haya visto.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 — Train / Test split -->\n  <section class=\"slide\" data-screen-label=\"11 Train Test\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Particiones<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · La regla de oro<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 20px;\">Nunca examines con las <em>mismas preguntas<\u002Fem> con las que estudiaste.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 24px; max-width: 1500px;\">Partes el dataset en dos: con uno entrenas, con el otro examinas. El modelo nunca debe «ver» el conjunto de test hasta el final.<\u002Fp>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 20px;\">\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 10px;\">Reparto típico · 75 / 25<\u002Fdiv>\n          <div style=\"display: flex; height: 56px; border: 1px solid var(--rule); overflow: hidden;\">\n            <div style=\"flex: 3; background: var(--primary); color: var(--paper); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase;\">Train · 75 % · el modelo aprende aquí<\u002Fdiv>\n            <div style=\"flex: 1; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase;\">Test · 25 %<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"two-col\" style=\"align-items: start;\">\n          <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n            <div class=\"card-num\">Train · Conjunto de entrenamiento<\u002Fdiv>\n            <h4>Los apuntes del curso<\u002Fh4>\n            <p>El modelo lo ve, aprende patrones, ajusta sus parámetros internos.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n            <div class=\"card-num\" style=\"color: var(--accent);\">Test · Conjunto de prueba<\u002Fdiv>\n            <h4>El examen final<\u002Fh4>\n            <p>El modelo <strong>no<\u002Fstrong> lo ve durante el entrenamiento. Solo al final, para medir su rendimiento real.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"analogy\">\n          <div class=\"a-tag\">Por qué es sagrado<\u002Fdiv>\n          <p>Si el modelo «ve» el test mientras entrena, los resultados están <em>inflados<\u002Fem>. Es como repasar el examen antes de hacerlo: parecerás un genio, pero el día de la entrevista de trabajo, se va a notar.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 — Tres particiones -->\n  <section class=\"slide cream\" data-screen-label=\"12 Train Val Test\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Particiones<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · La división profesional<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Tres particiones: <em>train · val · test<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">En proyectos serios se suele añadir un tercer trozo: el <strong>conjunto de validación<\u002Fstrong>. Sirve para afinar el modelo durante el entrenamiento sin tocar el test final.<\u002Fp>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 24px;\">\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Reparto típico · 60 / 20 / 20<\u002Fdiv>\n          <div style=\"display: flex; height: 70px; border: 1px solid var(--rule); overflow: hidden;\">\n            <div style=\"flex: 3; background: var(--primary); color: var(--paper); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase;\">Train · 60 %<\u002Fdiv>\n            <div style=\"flex: 1; background: oklch(0.55 0.15 240); color: white; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase;\">Val · 20 %<\u002Fdiv>\n            <div style=\"flex: 1; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase;\">Test · 20 %<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"three-col\" style=\"align-items: stretch;\">\n          <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n            <div class=\"card-num\">Train · 60 %<\u002Fdiv>\n            <h4>Las clases<\u002Fh4>\n            <p>Vas a clase, tomas apuntes, haces ejercicios. El modelo aprende.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-color: oklch(0.55 0.15 240); border-width: 1.5px;\">\n            <div class=\"card-num\" style=\"color: oklch(0.55 0.15 240);\">Validation · 20 %<\u002Fdiv>\n            <h4>Los simulacros<\u002Fh4>\n            <p>Exámenes de prueba durante el curso. Si suspendes, ajustas la forma de estudiar.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n            <div class=\"card-num\" style=\"color: var(--accent);\">Test · 20 %<\u002Fdiv>\n            <h4>El examen oficial<\u002Fh4>\n            <p>Una sola oportunidad. No se toca hasta el final.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"analogy\">\n          <div class=\"a-tag\">Por qué importa<\u002Fdiv>\n          <p>Con solo train/test corres el riesgo de afinar tanto contra el test que acabes haciendo trampa sin darte cuenta. El <em>val<\u002Fem> es el escudo entre tus iteraciones y la evaluación final.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 — train_test_split en código -->\n  <section class=\"slide\" data-screen-label=\"13 Codigo Split\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Particiones<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · Cómo se hace en pandas/sklearn<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Una función, <em>una línea<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 24px; max-width: 1500px;\">La función <code style=\"font-family: 'JetBrains Mono'; background: var(--paper-2); padding: 2px 8px; border-radius: 3px;\">train_test_split<\u002Fcode> lo hace todo. Le pasas tus datos y te devuelve las piezas listas.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start; gap: 56px;\">\n        <div>\n          <div class=\"label\" style=\"color: var(--primary); margin-bottom: 14px;\">Código<\u002Fdiv>\n          <div class=\"code\" style=\"font-size: 18px;\"><span class=\"kw\">from<\u002Fspan> sklearn.model_selection <span class=\"kw\">import<\u002Fspan> train_test_split\n\nX_train, X_test, y_train, y_test = <span class=\"fn\">train_test_split<\u002Fspan>(\n    X, y,\n    test_size=<span class=\"nm\">0.3<\u002Fspan>,        <span class=\"cm\"># 30 % al test<\u002Fspan>\n    random_state=<span class=\"nm\">42<\u002Fspan>,     <span class=\"cm\"># reproducibilidad<\u002Fspan>\n    stratify=y           <span class=\"cm\"># mantener proporciones<\u002Fspan>\n)<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Tres parámetros a recordar<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li><strong>test_size<\u002Fstrong> · qué porcentaje va al test (0.2 - 0.3 típico)<\u002Fli>\n            <li><strong>random_state<\u002Fstrong> · la <em>semilla<\u002Fem>. Sin esto, cada ejecución da resultados distintos<\u002Fli>\n            <li><strong>stratify<\u002Fstrong> · si tu dataset tiene 90 % no-baja y 10 % baja, te asegura que ambos conjuntos respeten esa proporción<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: 20px; padding: 16px 20px; background: oklch(0.97 0.04 30); border-left: 3px solid var(--warn);\">\n            <p class=\"body-sm\" style=\"font-size: 21px;\"><strong>Sin stratify<\u002Fstrong>, podrías acabar con un test que es 100 % no-baja por azar. El modelo nunca sería evaluado sobre la clase que de verdad importa.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 — Cross-validation -->\n  <section class=\"slide cream\" data-screen-label=\"14 Cross Validation\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Validación<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · Cuando los datos escasean<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Validación cruzada: el <em>jurado rotativo<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 28px; max-width: 1500px;\">Si tienes pocos datos, partirlos en train/test es un lujo. La validación cruzada <em>k-fold<\u002Fem> los aprovecha al máximo: cada trozo hace de test una vez.<\u002Fp>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 22px;\">\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 12px;\">5-fold cross-validation · Cada iteración rota el test<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <div style=\"display: grid; grid-template-columns: 90px repeat(5, 1fr); gap: 4px; align-items: center;\">\n              <div style=\"font-family: 'JetBrains Mono'; font-size: 14px; color: var(--ink-3); letter-spacing: 0.1em;\">FOLD 1<\u002Fdiv>\n              <div style=\"background: var(--accent); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TEST<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 90px repeat(5, 1fr); gap: 4px; align-items: center;\">\n              <div style=\"font-family: 'JetBrains Mono'; font-size: 14px; color: var(--ink-3); letter-spacing: 0.1em;\">FOLD 2<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--accent); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TEST<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 90px repeat(5, 1fr); gap: 4px; align-items: center;\">\n              <div style=\"font-family: 'JetBrains Mono'; font-size: 14px; color: var(--ink-3); letter-spacing: 0.1em;\">FOLD 3<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--accent); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TEST<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 90px repeat(5, 1fr); gap: 4px; align-items: center;\">\n              <div style=\"font-family: 'JetBrains Mono'; font-size: 14px; color: var(--ink-3); letter-spacing: 0.1em;\">FOLD 4<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--accent); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TEST<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 90px repeat(5, 1fr); gap: 4px; align-items: center;\">\n              <div style=\"font-family: 'JetBrains Mono'; font-size: 14px; color: var(--ink-3); letter-spacing: 0.1em;\">FOLD 5<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--primary); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TRAIN<\u002Fdiv>\n              <div style=\"background: var(--accent); color: white; padding: 10px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px;\">TEST<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"analogy\">\n          <div class=\"a-tag\">Analogía · El jurado rotativo<\u002Fdiv>\n          <p>Tienes 5 jueces. En vez de juzgar siempre con los mismos cuatro y dejar uno fuera, <strong>cada juez rota<\u002Fstrong>: en cada ronda uno actúa como crítico y los otros cuatro como acusados. Al final promedias las 5 puntuaciones.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 — Cross-validation código -->\n  <section class=\"slide\" data-screen-label=\"15 Codigo CrossVal\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Validación<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.3 · En código · 3 líneas<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">cross_val_score: el <em>combo<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 24px; max-width: 1500px;\">Sklearn lo automatiza todo. Le pasas el modelo, los datos y el número de folds, y te devuelve las puntuaciones.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start; gap: 56px;\">\n        <div>\n          <div class=\"label\" style=\"color: var(--primary); margin-bottom: 14px;\">Código<\u002Fdiv>\n          <div class=\"code\" style=\"font-size: 18px;\"><span class=\"kw\">from<\u002Fspan> sklearn.model_selection <span class=\"kw\">import<\u002Fspan> cross_val_score\n<span class=\"kw\">from<\u002Fspan> sklearn.svm <span class=\"kw\">import<\u002Fspan> LinearSVC\n\nmodel = <span class=\"fn\">LinearSVC<\u002Fspan>(random_state=<span class=\"nm\">42<\u002Fspan>)\nscores = <span class=\"fn\">cross_val_score<\u002Fspan>(model, X, y, cv=<span class=\"nm\">5<\u002Fspan>)\n\n<span class=\"fn\">print<\u002Fspan>(scores)\n<span class=\"cm\"># → [0.97, 0.93, 0.97, 0.97, 1.00]<\u002Fspan>\n<span class=\"fn\">print<\u002Fspan>(scores.<span class=\"fn\">mean<\u002Fspan>())\n<span class=\"cm\"># → 0.968  (96.8 % accuracy promedio)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Qué te dice esto<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li>Promedio del 96.8 % → buen modelo<\u002Fli>\n            <li>Las 5 puntuaciones son <em>parecidas<\u002Fem> → resultado estable<\u002Fli>\n            <li>Si una fuese 60 % y otra 95 %, sospechosísimo<\u002Fli>\n            <li>Mejor que un único train/test: ves la <em>varianza<\u002Fem><\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: 22px; padding: 16px 20px; background: oklch(0.97 0.04 160); border-left: 3px solid var(--ok);\">\n            <p class=\"body-sm\" style=\"font-size: 21px;\"><strong>Variantes útiles<\u002Fstrong> · <em>StratifiedKFold<\u002Fem> para clasificación · <em>TimeSeriesSplit<\u002Fem> para series temporales (¡nunca mezclar pasado y futuro!).<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16 — Recap Bloque I -->\n  <section class=\"slide cream\" data-screen-label=\"16 Recap BloqueI\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque I · Recap<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">Lo que llevamos hasta aquí<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 48px;\">Cuatro ideas para <em>no olvidar<\u002Fem>.<\u002Fh2>\n      <div class=\"four-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">01<\u002Fdiv>\n          <h4>Define el problema<\u002Fh4>\n          <p>Regresión, clasificación o clustering. La elección de algoritmo se desprende de ahí.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">02<\u002Fdiv>\n          <h4>fit / predict<\u002Fh4>\n          <p>Todos los modelos de sklearn se entrenan igual. Cambias el nombre del modelo y nada más.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--warn); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--warn);\">03<\u002Fdiv>\n          <h4>Vigila el sobreajuste<\u002Fh4>\n          <p>Si el modelo es genio en train pero malo en test, ha memorizado sin entender.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--ok); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">04<\u002Fdiv>\n          <h4>Cross-validation<\u002Fh4>\n          <p>Cuando los datos escasean, el k-fold rota el test y te da una medida más fiable.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17 — Divider personaje histórico -->\n  <section class=\"slide cream\" data-screen-label=\"17 Pausa Personaje\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Un alto en el camino<\u002Fspan><\u002Fdiv>\n    <div class=\"body\" style=\"justify-content: center;\">\n      <div class=\"divider-num\" style=\"margin-bottom: 32px; color: var(--primary);\">Intermedio · Historia<\u002Fdiv>\n      <h1 class=\"display\" style=\"font-size: 196px; color: var(--ink);\">Sir Ronald<br><em>A. Fisher<\u002Fem>.<\u002Fh1>\n      <p class=\"lead\" style=\"margin-top: 48px; max-width: 1200px;\">1890 — 1962. El estadístico que inventó el dataset que sale en cada manual de machine learning.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18 — Fisher bio -->\n  <section class=\"slide\" data-screen-label=\"18 Fisher Bio\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Intermedio · Quién fue<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 18px;\">El padre de la estadística moderna<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 22px; font-size: 78px;\">Un matemático en un campo de <em>guisantes<\u002Fem>.<\u002Fh2>\n      <div style=\"flex: 1; display: grid; grid-template-columns: 320px 1fr; gap: 44px; align-items: start;\">\n        <div>\n          <div class=\"portrait-frame\" style=\"background: oklch(0.25 0.04 60);\">\n            <img src=\"42c6f3d9-be03-48e9-adb5-7cd415127720\" alt=\"Ronald A. Fisher, c. 1913\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; filter: contrast(1.02) saturate(0.9);\">\n            <div style=\"position: absolute; left: 0; right: 0; bottom: 0; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 100%); z-index: 1;\"><\u002Fdiv>\n            <div class=\"portrait-mono\" style=\"z-index: 2;\">Ronald A. Fisher · c. 1913<\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"body-sm\" style=\"margin-top: 10px; font-size: 16px; color: var(--ink-3); text-align: center;\">Foto: dominio público · Wikimedia Commons.<\u002Fp>\n          <p class=\"body-md\" style=\"margin-top: 20px; font-size: 19px; line-height: 1.45;\">Británico (1890–1962). Polímata: matemático, biólogo y genetista. Pasó <strong>14 años<\u002Fstrong> en la estación agrícola de <em>Rothamsted<\u002Fem> analizando cosechas — y en ese campo de guisantes inventó casi toda la estadística que hoy usamos para evaluar modelos de ML.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px 36px;\">\n          <div>\n            <div class=\"label\" style=\"border-top: 2px solid var(--primary); padding-top: 10px; margin-bottom: 12px;\">Hitos<\u002Fdiv>\n            <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 18px; line-height: 1.4; color: var(--ink-2);\">\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1912<\u002Fstrong> · publica la <em>estimación por máxima verosimilitud<\u002Fem> siendo aún estudiante<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1919–33<\u002Fstrong> · 14 años en Rothamsted analizando cosechas desde 1843<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1925<\u002Fstrong> · <em>Statistical Methods for Research Workers<\u002Fem>, biblia del oficio durante 50 años<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1925<\u002Fstrong> · funda el <em>ANOVA<\u002Fem> y populariza el umbral <em>p&nbsp;&lt;&nbsp;0.05<\u002Fem><\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1930<\u002Fstrong> · <em>The Genetical Theory of Natural Selection<\u002Fem>: une Mendel y Darwin<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1935<\u002Fstrong> · <em>The Design of Experiments<\u002Fem> · principio de aleatorización<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— <strong>1936<\u002Fstrong> · publica el dataset <em>Iris<\u002Fem>, hoy «hola mundo» del ML<\u002Fli>\n              <li style=\"padding: 7px 0;\">— <strong>1952<\u002Fstrong> · Sir Ronald Fisher, nombrado caballero por Isabel II<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div>\n            <div class=\"label\" style=\"border-top: 2px solid var(--accent); padding-top: 10px; margin-bottom: 12px; color: var(--accent);\">Curiosidades<\u002Fdiv>\n            <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 18px; line-height: 1.4; color: var(--ink-2);\">\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— Era el menor de unos gemelos; su hermano nació muerto. Su madre, supersticiosa, decidió que todos sus hijos llevasen una «y» en el nombre — de ahí <strong>A<em>y<\u002Fem>lmer<\u002Fstrong><\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— Miopía severa: le prohibieron leer con luz eléctrica. Aprendió a hacer <em>geometría mentalmente<\u002Fem>, intuición que marcaría toda su estadística<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— En <strong>1914<\u002Fstrong> se ofreció voluntario para la Gran Guerra. Lo rechazaron por miope — probablemente le salvó la vida<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— Se casó en secreto con <strong>Ruth Eileen Guinness<\u002Fstrong> (sí, esa familia), de 17 años. Tuvieron <strong>ocho hijos<\u002Fstrong><\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— El experimento de <em>«la dama que prueba té»<\u002Fem> (1935) — una colega decía notar si la leche se servía antes o después — dio origen al ensayo aleatorizado moderno<\u002Fli>\n              <li style=\"padding: 7px 0; border-bottom: 1px solid var(--rule);\">— Feudo de décadas con <strong>Karl Pearson<\u002Fstrong>: dos titanes que no se hablaban<\u002Fli>\n              <li style=\"padding: 7px 0;\">— Lado oscuro: fumador empedernido, negó la relación tabaco-cáncer; defendió la eugenesia toda su vida. En 2020 retiraron su vidriera del Caius College de Cambridge<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 19 — Legado Fisher -->\n  <section class=\"slide cream\" data-screen-label=\"19 Fisher Legado\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Intermedio · Su legado<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">Tres ideas que usamos cada día<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 40px;\">Lo que nos dejó.<\u002Fh2>\n      <div class=\"three-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">01 · El dataset Iris<\u002Fdiv>\n          <h4>150 flores, 3 especies<\u002Fh4>\n          <p>Lo midió él mismo en 1936 para enseñar análisis discriminante. Hoy es el «hola mundo» del ML: aparece en sklearn, R, TensorFlow…<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">90 años después, sigue siendo el ejemplo de manual.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">02 · ANOVA<\u002Fdiv>\n          <h4>Análisis de la varianza<\u002Fh4>\n          <p>Inventado para saber si tres variedades de trigo dan rendimientos distintos. La base estadística sobre la que se apoya gran parte del ML clásico.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Cada vez que comparas modelos, hereda algo de Fisher.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">03 · p-valor<\u002Fdiv>\n          <h4>El umbral del 5 %<\u002Fh4>\n          <p>«Si la probabilidad de que esto pase por azar es menor del 5 %, lo considero significativo». Una convención suya que hoy domina toda la ciencia.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Discutida pero universal. Sigue en cada paper.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"body-md\" style=\"margin-top: 32px; max-width: 1500px;\">Sin Fisher, no habría <em>cross_val_score<\u002Fem>, ni <em>p &lt; 0.05<\u002Fem>, ni la pregunta «¿es este modelo mejor que el otro?». Sentó el lenguaje con el que hablamos de evaluación.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 20 — Por qué importa hoy -->\n  <section class=\"slide\" data-screen-label=\"20 Fisher Hoy\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Intermedio · Aplicación<\u002Fspan><\u002Fdiv>\n    <div class=\"body\" style=\"justify-content: center;\">\n      <div class=\"label-accent\" style=\"margin-bottom: 32px;\">Conexión con el tema de hoy<\u002Fdiv>\n      <h2 class=\"h2\" style=\"margin-bottom: 40px; max-width: 1500px;\">«Para llamar al estadístico cuando los datos ya están recogidos, suele ser tarde. Igual debería <em>haber hecho la autopsia<\u002Fem> al difunto.»<\u002Fh2>\n      <p class=\"body-md\" style=\"max-width: 1500px;\">Fisher decía esto en los años 30. Hoy podríamos decir lo mismo del científico de datos: si solo te llaman cuando el modelo ya está entrenado y no funciona, la película ya se rodó mal. <strong>El diseño experimental y la validación se piensan al principio<\u002Fstrong>, no al final.<\u002Fp>\n      <p class=\"body-sm\" style=\"margin-top: 40px; font-size: 22px; color: var(--ink-3); max-width: 1500px;\">Por eso hablamos de particiones, cross-validation y métricas <em>antes<\u002Fem> de meternos a hiperparámetros. La evaluación no es la última fase. Es la columna vertebral.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 21 — Divider Bloque II -->\n  <section class=\"slide dark\" data-screen-label=\"21 Bloque II\">\n    <div class=\"dot-grid\"><\u002Fdiv>\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II<\u002Fspan><\u002Fdiv>\n    <div class=\"body\" style=\"justify-content: center;\">\n      <div class=\"divider-num\" style=\"margin-bottom: 32px;\">Bloque · 02<\u002Fdiv>\n      <h1 class=\"divider-title\">Medir y<br><em>refinar<\u002Fem>.<\u002Fh1>\n      <p class=\"lead\" style=\"margin-top: 48px; max-width: 1100px;\">Un modelo sin métricas es una opinión. Veremos qué medir, con qué fórmula y cómo ajustar los hiperparámetros.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 22 — Qué métrica usar -->\n  <section class=\"slide\" data-screen-label=\"22 Que Metrica\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Métricas<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · El primer cruce de caminos<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 32px;\">¿Qué <em>métrica<\u002Fem> elijo?<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 36px; max-width: 1500px;\">Depende del tipo de problema. Cada familia tiene sus propias métricas. Y dentro de cada familia, la elección depende de qué error te duele más.<\u002Fp>\n      <div class=\"three-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Regresión · números<\u002Fdiv>\n          <h4>¿Cuánto fallé?<\u002Fh4>\n          <ul style=\"font-size: 22px; color: var(--ink-2); padding-left: 18px; margin: 6px 0 0 0;\">\n            <li>MAE<\u002Fli>\n            <li>MSE<\u002Fli>\n            <li>RMSE<\u002Fli>\n            <li>R²<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Clasificación · etiquetas<\u002Fdiv>\n          <h4>¿Cuántas acerté?<\u002Fh4>\n          <ul style=\"font-size: 22px; color: var(--ink-2); padding-left: 18px; margin: 6px 0 0 0;\">\n            <li>Accuracy<\u002Fli>\n            <li>Precision<\u002Fli>\n            <li>Recall<\u002Fli>\n            <li>F1-score<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">Clustering · grupos<\u002Fdiv>\n          <h4>¿Son grupos compactos?<\u002Fh4>\n          <ul style=\"font-size: 22px; color: var(--ink-2); padding-left: 18px; margin: 6px 0 0 0;\">\n            <li>Silhouette<\u002Fli>\n            <li>Davies-Bouldin<\u002Fli>\n            <li>Dunn index<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\" style=\"margin-top: 30px;\">\n        <div class=\"a-tag\">Regla maestra<\u002Fdiv>\n        <p>«Cuál es la métrica correcta» = «cuál es el error que más me duele en mi problema concreto». No hay una métrica universal.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 23 — Métricas de regresión -->\n  <section class=\"slide cream\" data-screen-label=\"23 Metricas Regresion\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Regresión<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · Métricas de regresión<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Cuatro formas de medir <em>cuánto fallaste<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 28px; max-width: 1500px;\">Imagina que predices el precio de un piso. El precio real son 200.000 €, tu modelo dice 215.000 €. Te has equivocado en 15.000 €. ¿Y ahora?<\u002Fp>\n      <div class=\"four-col\" style=\"flex: 1; align-items: stretch; gap: 22px;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">MAE<\u002Fdiv>\n          <h4>Error absoluto medio<\u002Fh4>\n          <p style=\"font-size: 20px;\">Promedio de los errores en valor absoluto.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\"><em>«Me equivoco de media en 12 000 €».<\u002Fem> Fácil de entender.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">MSE<\u002Fdiv>\n          <h4>Error cuadrático medio<\u002Fh4>\n          <p style=\"font-size: 20px;\">Como MAE, pero elevando al cuadrado.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Castiga mucho los errores <em>grandes<\u002Fem>. Útil si un fallo gordo es catastrófico.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">RMSE<\u002Fdiv>\n          <h4>Raíz del MSE<\u002Fh4>\n          <p style=\"font-size: 20px;\">Misma idea, pero en las unidades originales.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">El más popular en regresión. <em>«Mi modelo se desvía 13 500 €».<\u002Fem><\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--ok); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">R²<\u002Fdiv>\n          <h4>Coeficiente de determinación<\u002Fh4>\n          <p style=\"font-size: 20px;\">Va de 0 a 1. <em>Qué fracción de la variabilidad explica el modelo.<\u002Fem><\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">0.95 = excelente. 0.20 = casi inútil. 0 = predecir la media bastaría.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 24 — Analogía regresión -->\n  <section class=\"slide\" data-screen-label=\"24 Analogia Regresion\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Regresión<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · El símil del dardo<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 32px;\">Predecir es <em>tirar al centro<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">El valor real es la diana. Tu predicción es donde clava el dardo. La distancia entre am
