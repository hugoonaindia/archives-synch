bos es el <strong>error<\u002Fstrong>. Las cuatro métricas son distintas formas de promediar esas distancias.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start;\">\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 16px;\">¿Por qué hay tantas?<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li><strong>MAE<\u002Fstrong>: cada metro de error pesa lo mismo<\u002Fli>\n            <li><strong>MSE / RMSE<\u002Fstrong>: un dardo a 10 m del centro es <em>100 veces peor<\u002Fem> que uno a 1 m. Penaliza fallos gordos<\u002Fli>\n            <li><strong>R²<\u002Fstrong>: «¿voy mejor que tirar al bulto, sin mirar?»<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"analogy\" style=\"border-left-color: var(--primary);\">\n          <div class=\"a-tag\" style=\"color: var(--primary);\">Caso GymPro<\u002Fdiv>\n          <p>Predecimos cuántos meses se quedará un socio antes de darse de baja.<\u002Fp>\n          <p>El real: <strong>8 meses<\u002Fstrong>. El modelo dice <strong>9 meses<\u002Fstrong>. MAE = 1 mes.<\u002Fp>\n          <p>Si para el negocio fallar por 10 meses es <em>desastroso<\u002Fem> y fallar por 1 mes es asumible → usa <em>RMSE<\u002Fem>, que castiga los fallos gordos.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"body-sm\" style=\"margin-top: 28px; font-size: 21px; max-width: 1500px;\">No hay métrica «correcta» en abstracto. <em>Hay métrica correcta para tu problema<\u002Fem>.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 25 — Matriz de confusión -->\n  <section class=\"slide cream\" data-screen-label=\"25 Matriz Confusion\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Clasificación<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · Antes de las métricas, esta tabla<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">La <em>matriz de confusión<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 28px; max-width: 1500px;\">Para clasificar entre dos clases (baja / no-baja, enfermo / sano…) lo primero es contar las <strong>cuatro<\u002Fstrong> casillas posibles.<\u002Fp>\n      <div style=\"flex: 1; display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; align-items: start;\">\n        <div>\n          <div style=\"display: grid; grid-template-columns: 140px 1fr 1fr; gap: 4px;\">\n            <div><\u002Fdiv>\n            <div style=\"text-align: center; font-family: 'JetBrains Mono'; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 8px;\">Predijo POSITIVO<\u002Fdiv>\n            <div style=\"text-align: center; font-family: 'JetBrains Mono'; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 8px;\">Predijo NEGATIVO<\u002Fdiv>\n\n            <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 12px; display: flex; align-items: center;\">Real positivo<\u002Fdiv>\n            <div style=\"background: oklch(0.92 0.10 160); padding: 22px; text-align: center;\">\n              <div style=\"font-family: 'Fraunces'; font-size: 32px; color: var(--ok);\">VP<\u002Fdiv>\n              <div style=\"font-size: 16px; color: var(--ink-2);\">Verdadero positivo<br>✓ acertaste<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: oklch(0.94 0.10 30); padding: 22px; text-align: center;\">\n              <div style=\"font-family: 'Fraunces'; font-size: 32px; color: var(--warn);\">FN<\u002Fdiv>\n              <div style=\"font-size: 16px; color: var(--ink-2);\">Falso negativo<br>✗ se te escapó<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 12px; display: flex; align-items: center;\">Real negativo<\u002Fdiv>\n            <div style=\"background: oklch(0.94 0.10 30); padding: 22px; text-align: center;\">\n              <div style=\"font-family: 'Fraunces'; font-size: 32px; color: var(--warn);\">FP<\u002Fdiv>\n              <div style=\"font-size: 16px; color: var(--ink-2);\">Falso positivo<br>✗ falsa alarma<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: oklch(0.92 0.10 160); padding: 22px; text-align: center;\">\n              <div style=\"font-family: 'Fraunces'; font-size: 32px; color: var(--ok);\">VN<\u002Fdiv>\n              <div style=\"font-size: 16px; color: var(--ink-2);\">Verdadero negativo<br>✓ acertaste<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Ejemplo · Test de COVID<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li><strong>VP<\u002Fstrong>: estás enfermo y el test lo dice. ✓<\u002Fli>\n            <li><strong>VN<\u002Fstrong>: estás sano y el test lo dice. ✓<\u002Fli>\n            <li><strong>FP<\u002Fstrong>: estás sano pero el test dice positivo. <em>Aislamiento innecesario.<\u002Fem><\u002Fli>\n            <li><strong>FN<\u002Fstrong>: estás enfermo pero el test dice negativo. <em>Contagias sin saberlo.<\u002Fem><\u002Fli>\n          <\u002Ful>\n          <p class=\"body-sm\" style=\"margin-top: 18px; font-size: 21px;\">Las 4 métricas siguientes salen de combinar estos 4 números.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 26 — Accuracy / Precision / Recall / F1 -->\n  <section class=\"slide\" data-screen-label=\"26 Metricas Clasif\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Clasificación<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · Las cuatro hermanas<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 28px;\">Accuracy, Precision, Recall, <em>F1<\u002Fem>.<\u002Fh2>\n      <div class=\"four-col\" style=\"flex: 1; align-items: stretch; gap: 22px;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Accuracy<\u002Fdiv>\n          <h4>Exactitud<\u002Fh4>\n          <p style=\"font-size: 20px;\"><em>(VP + VN) / total<\u002Fem><\u002Fp>\n          <p style=\"font-size: 19px;\">Del total de casos, ¿qué fracción acerté?<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Trampa: si el 99 % de los emails NO son spam, marcar todo como «no spam» da 99 % de accuracy. Inservible.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Precision<\u002Fdiv>\n          <h4>Precisión<\u002Fh4>\n          <p style=\"font-size: 20px;\"><em>VP / (VP + FP)<\u002Fem><\u002Fp>\n          <p style=\"font-size: 19px;\">De los que <strong>marqué como positivos<\u002Fstrong>, ¿cuántos lo eran de verdad?<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Importa cuando un FP es muy caro (acusar a un inocente).<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--ok); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">Recall<\u002Fdiv>\n          <h4>Sensibilidad<\u002Fh4>\n          <p style=\"font-size: 20px;\"><em>VP / (VP + FN)<\u002Fem><\u002Fp>\n          <p style=\"font-size: 19px;\">De los que <strong>eran positivos<\u002Fstrong>, ¿a cuántos pillé?<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Importa cuando un FN es muy caro (no detectar un cáncer).<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--warn); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--warn);\">F1-score<\u002Fdiv>\n          <h4>El equilibrio<\u002Fh4>\n          <p style=\"font-size: 20px;\"><em>media armónica de P y R<\u002Fem><\u002Fp>\n          <p style=\"font-size: 19px;\">Compromiso entre precision y recall. Va de 0 a 1.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">Útil cuando importan los dos errores por igual.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 27 — Cuándo cada una -->\n  <section class=\"slide cream\" data-screen-label=\"27 Cuando Cada\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Clasificación<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · El símil del médico, el guardia y el filtro<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 32px;\">¿Qué error te <em>duele más<\u002Fem>?<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">No hay métrica buena en abstracto. Hay la métrica que protege contra el error que <em>no te puedes permitir<\u002Fem>.<\u002Fp>\n      <div class=\"three-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--warn); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--warn);\">Diagnóstico de cáncer<\u002Fdiv>\n          <h4>Maximizar Recall<\u002Fh4>\n          <p>FN = enviar a casa a un enfermo. Inaceptable.<\u002Fp>\n          <p>FP = falsa alarma, prueba extra. Molesto, pero asumible.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">«Prefiero asustar a 10 sanos que perder a 1 enfermo».<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Filtro anti-spam<\u002Fdiv>\n          <h4>Maximizar Precision<\u002Fh4>\n          <p>FN = un spam llega a la bandeja. Molesto.<\u002Fp>\n          <p>FP = un correo del jefe va al spam. <em>Desastre.<\u002Fem><\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">«Prefiero que se cuele algún spam a perder correos importantes».<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Churn de GymPro<\u002Fdiv>\n          <h4>F1-score<\u002Fh4>\n          <p>Importan ambos: si no detectas al que se va, lo pierdes. Si llamas a uno que no se iba, gastas dinero.<\u002Fp>\n          <p style=\"font-size: 18px; color: var(--ink-3); margin-top: auto;\">El compromiso de F1 es lo más sensato cuando ningún error domina.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 28 — Clustering -->\n  <section class=\"slide\" data-screen-label=\"28 Metricas Clustering\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Clustering<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.4 · Métricas sin etiquetas<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Cuando no hay <em>respuesta correcta<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 28px; max-width: 1500px;\">En clustering nadie ha etiquetado los datos. Las métricas miden algo más abstracto: ¿son los grupos <strong>compactos por dentro<\u002Fstrong> y <strong>separados por fuera<\u002Fstrong>?<\u002Fp>\n      <div class=\"three-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Silhouette · −1 a +1<\u002Fdiv>\n          <h4>El más usado<\u002Fh4>\n          <p>Mide qué tan cerca está cada punto de su propio grupo, comparado con el grupo más cercano.<\u002Fp>\n          <p style=\"font-size: 19px;\"><strong>+1<\u002Fstrong> bien clasificado · <strong>0<\u002Fstrong> en el límite · <strong>−1<\u002Fstrong> mal asignado.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Davies-Bouldin<\u002Fdiv>\n          <h4>Cuanto menor, mejor<\u002Fh4>\n          <p>Promedio del peor caso: dispersión dentro de cada cluster frente a su distancia al cluster más cercano.<\u002Fp>\n          <p style=\"font-size: 19px;\">Valores cerca de <strong>0<\u002Fstrong> indican grupos bien separados.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"card-num\" style=\"color: var(--ok);\">Dunn index<\u002Fdiv>\n          <h4>Cuanto mayor, mejor<\u002Fh4>\n          <p>Ratio entre la distancia mínima entre clusters y el diámetro máximo dentro de un cluster.<\u002Fp>\n          <p style=\"font-size: 19px;\">Premia grupos <strong>compactos<\u002Fstrong> y <strong>bien separados<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\" style=\"margin-top: 30px;\">\n        <div class=\"a-tag\">Analogía · Mesas de un restaurante<\u002Fdiv>\n        <p>Cada mesa = un cluster. Una buena distribución es: la gente de cada mesa se conoce entre sí (compacto) y las mesas están bien separadas. Si todo el mundo está mezclado, mal cluster.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 29 — Parámetros vs Hiperparámetros -->\n  <section class=\"slide cream\" data-screen-label=\"29 Param Hiperparam\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Hiperparámetros<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.5 · Dos conceptos que se confunden<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 28px;\">La <em>receta<\u002Fem> y el <em>cocinero<\u002Fem>.<\u002Fh2>\n      <div class=\"two-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Parámetros<\u002Fdiv>\n          <h4>Lo que aprende el modelo<\u002Fh4>\n          <p>Los <em>pesos<\u002Fem> de una red neuronal, los coeficientes de una regresión, las divisiones de un árbol.<\u002Fp>\n          <p>El algoritmo los ajusta <strong>solo<\u002Fstrong>, mientras entrena.<\u002Fp>\n          <p style=\"font-size: 19px; color: var(--ink-3); margin-top: auto;\"><em>Analogía:<\u002Fem> los gestos que el cocinero perfecciona practicando.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Hiperparámetros<\u002Fdiv>\n          <h4>Lo que tú decides antes<\u002Fh4>\n          <p>Cuántas neuronas tiene la red, qué tipo de penalización usa el SVM, cuántos árboles en un Random Forest.<\u002Fp>\n          <p>Se eligen <strong>antes<\u002Fstrong> de entrenar. El modelo no los aprende.<\u002Fp>\n          <p style=\"font-size: 19px; color: var(--ink-3); margin-top: auto;\"><em>Analogía:<\u002Fem> la receta que el chef decide seguir.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"analogy\" style=\"margin-top: 28px;\">\n        <div class=\"a-tag\">Por qué importa<\u002Fdiv>\n        <p>La misma masa con distinta receta da pan o bizcocho. Los datos son los mismos, pero los hiperparámetros marcan qué modelo sale. Por eso hay que probar varias combinaciones.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 30 — Gradient descent -->\n  <section class=\"slide\" data-screen-label=\"30 Gradient Descent\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Optimización<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.5 · Cómo aprende un modelo<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">El <em>gradiente descendente<\u002Fem>: bajar la montaña con los ojos cerrados.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 28px; max-width: 1500px;\">El error del modelo es una función matemática. Entrenarlo es <strong>minimizar<\u002Fstrong> esa función. El gradiente descendente es la receta universal para hacerlo.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start;\">\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Analogía · La montaña en la niebla<\u002Fdiv>\n          <ol style=\"padding-left: 24px; font-size: 22px; line-height: 1.55; color: var(--ink-2); margin: 0;\">\n            <li style=\"margin-bottom: 10px;\">Estás en una montaña. Hay niebla. Quieres bajar al valle.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Tocas el suelo con el pie: ¿hacia dónde baja?<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Das un paso en esa dirección.<\u002Fli>\n            <li style=\"margin-bottom: 10px;\">Repites. Una y otra vez.<\u002Fli>\n            <li>Eventualmente llegas a un valle (mínimo de la función de error).<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n        <div>\n          <div class=\"label\" style=\"margin-bottom: 14px;\">Variantes<\u002Fdiv>\n          <ul class=\"bullets\">\n            <li><strong>GD clásico<\u002Fstrong>: mira todos los datos en cada paso. Lento<\u002Fli>\n            <li><strong>SGD<\u002Fstrong> (estocástico): mira <em>uno<\u002Fem> a la vez. Mucho más rápido<\u002Fli>\n            <li><strong>Mini-batch<\u002Fstrong>: mira lotes pequeños. El más usado en deep learning<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: 18px; padding: 14px 18px; background: oklch(0.97 0.04 30); border-left: 3px solid var(--warn);\">\n            <p class=\"body-sm\" style=\"font-size: 20px;\"><strong>El paso (learning rate)<\u002Fstrong> es un hiperparámetro clave. Si das pasos gigantes, te pasas el valle. Si das pasos minúsculos, no llegas nunca.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 31 — GridSearch / RandomizedSearch -->\n  <section class=\"slide cream\" data-screen-label=\"31 Grid Search\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Refinamiento<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.5 · Probar combinaciones automáticamente<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">GridSearchCV vs <em>RandomizedSearchCV<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 28px; max-width: 1500px;\">Tienes varios hiperparámetros que probar. ¿Pruebas todas las combinaciones? ¿Solo algunas al azar? Sklearn tiene ambas opciones, automatizadas con cross-validation incluido.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: start; gap: 48px;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">GridSearchCV<\u002Fdiv>\n          <h4>Prueba todas las combinaciones<\u002Fh4>\n          <p>Definimos una <em>rejilla<\u002Fem>: 3 valores de C, 2 valores de penalty, 4 de tol → prueba 24 combos.<\u002Fp>\n          <div class=\"code\" style=\"font-size: 16px; padding: 14px; margin-top: 8px;\">grid = {<span class=\"st\">'C'<\u002Fspan>: [<span class=\"nm\">0.1<\u002Fspan>, <span class=\"nm\">1<\u002Fspan>, <span class=\"nm\">10<\u002Fspan>],\n        <span class=\"st\">'penalty'<\u002Fspan>: [<span class=\"st\">'l1'<\u002Fspan>, <span class=\"st\">'l2'<\u002Fspan>]}\n\n<span class=\"fn\">GridSearchCV<\u002Fspan>(model, grid, cv=<span class=\"nm\">5<\u002Fspan>)<\u002Fdiv>\n          <p style=\"font-size: 19px; color: var(--ink-3);\"><strong>Ventaja:<\u002Fstrong> exhaustivo.<br><strong>Desventaja:<\u002Fstrong> explota en combinaciones.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">RandomizedSearchCV<\u002Fdiv>\n          <h4>Prueba solo N al azar<\u002Fh4>\n          <p>De entre todas las combinaciones, samplea N al azar. Si tienes 10 000 combos, pruebas 50.<\u002Fp>\n          <div class=\"code\" style=\"font-size: 16px; padding: 14px; margin-top: 8px;\"><span class=\"fn\">RandomizedSearchCV<\u002Fspan>(\n    model, dist,\n    n_iter=<span class=\"nm\">50<\u002Fspan>, cv=<span class=\"nm\">5<\u002Fspan>)<\u002Fdiv>\n          <p style=\"font-size: 19px; color: var(--ink-3);\"><strong>Ventaja:<\u002Fstrong> rápido, suele encontrar buenos hiperparámetros.<br><strong>Desventaja:<\u002Fstrong> no garantiza el óptimo.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 32 — Regularización + Dropout -->\n  <section class=\"slide\" data-screen-label=\"32 Regularizacion Dropout\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Refinamiento<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">5.5 · Dos joyas contra el sobreajuste<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 24px;\">Regularización y <em>dropout<\u002Fem>.<\u002Fh2>\n      <p class=\"body-md\" style=\"margin-bottom: 32px; max-width: 1500px;\">Más allá de ajustar hiperparámetros, hay técnicas específicas para evitar que el modelo se memorice los datos.<\u002Fp>\n      <div class=\"two-col\" style=\"flex: 1; align-items: stretch;\">\n        <div class=\"card\" style=\"border-color: var(--primary); border-width: 1.5px;\">\n          <div class=\"card-num\">Regularización (L1, L2)<\u002Fdiv>\n          <h4>Penalizar la complejidad<\u002Fh4>\n          <p>El modelo recibe una <em>multa<\u002Fem> por usar pesos muy grandes. Le obliga a soluciones más simples.<\u002Fp>\n          <p>L1 → empuja pesos a cero (selección de variables).<\u002Fp>\n          <p>L2 → reduce todos los pesos suavemente.<\u002Fp>\n          <p style=\"font-size: 19px; color: var(--ink-3); margin-top: auto;\"><em>Analogía:<\u002Fem> al cocinero le dicen «con menos ingredientes». Receta más limpia, menos errores.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: var(--accent); border-width: 1.5px;\">\n          <div class=\"card-num\" style=\"color: var(--accent);\">Dropout (deep learning)<\u002Fdiv>\n          <h4>Apagar neuronas al azar<\u002Fh4>\n          <p>En cada paso del entrenamiento, un porcentaje aleatorio de neuronas <strong>se desactiva<\u002Fstrong>.<\u002Fp>\n          <p>El resto tiene que aprender a apañarse sin ellas. La red entera generaliza mejor.<\u002Fp>\n          <p style=\"font-size: 19px; color: var(--ink-3); margin-top: auto;\"><em>Analogía:<\u002Fem> un equipo de fútbol donde a cada minuto sustituyes 2 jugadores al azar. Nadie depende de nadie.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 33 — Pipeline completo -->\n  <section class=\"slide cream\" data-screen-label=\"33 Pipeline Completo\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Recap<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">El proceso completo<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 40px;\">De cero a modelo afinado, en <em>siete pasos<\u002Fem>.<\u002Fh2>\n      <div style=\"flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; align-items: stretch;\">\n        <div style=\"background: white; border: 1px solid var(--rule); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--primary);\">01<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1;\">Definir problema<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--ink-2);\">Regresión / clasificación / clustering.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: white; border: 1px solid var(--rule); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--primary);\">02<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1;\">Preprocesar<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--ink-2);\">Limpiar, escalar, codificar (Sesión 4).<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: white; border: 1px solid var(--rule); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--primary);\">03<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1;\">Particiones<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--ink-2);\">Train / val / test con <em>stratify<\u002Fem>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: white; border: 1.5px solid var(--accent); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--accent);\">04<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1;\">Entrenar<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--ink-2);\">Primer baseline con valores por defecto.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: white; border: 1.5px solid var(--accent); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--accent);\">05<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1;\">Evaluar<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--ink-2);\">Métricas + cross-validation.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: white; border: 1.5px solid var(--accent); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--accent);\">06<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1;\">Refinar<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--ink-2);\">GridSearch + regularización.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: var(--primary); color: var(--paper); padding: 20px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: 'JetBrains Mono'; font-size: 13px; color: var(--accent);\">07<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces'; font-size: 22px; line-height: 1.1; color: var(--paper);\">Test final<\u002Fdiv>\n          <div style=\"font-size: 16px; color: var(--paper); opacity: 0.85;\">Una sola vez, con los datos vírgenes.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"body-md\" style=\"margin-top: 36px; max-width: 1500px;\">Pasos 4-6 son <em>iterativos<\u002Fem>: pruebas, evalúas, refinas, vuelves. Solo cuando estás satisfecho tocas el test (paso 7).<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 34 — Quiz -->\n  <section class=\"slide\" data-screen-label=\"34 Quiz\">\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Bloque II · Quiz<\u002Fspan><\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"label-accent\" style=\"margin-bottom: 24px;\">¿Listos para decidir?<\u002Fdiv>\n      <h2 class=\"h1\" style=\"margin-bottom: 32px;\">¿Qué <em>métrica<\u002Fem> usarías?<\u002Fh2>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 22px;\">\n        <div class=\"quiz-card\" data-q=\"recall\">\n          <p class=\"quiz-q\">01 · Modelo que detecta tumores en radiografías. Lo peor es <em>no detectar<\u002Fem> a un enfermo.<\u002Fp>\n          <div class=\"quiz-options\">\n            <button class=\"ix-btn\" data-pick=\"accuracy\">Accuracy<\u002Fbutton>\n            <button class=\"ix-btn\" data-pick=\"precision\">Precision<\u002Fbutton>\n            <button class=\"ix-btn\" data-pick=\"recall\">Recall<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"quiz-feedback\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"quiz-card\" data-q=\"rmse\">\n          <p class=\"quiz-q\">02 · Predecir el precio de un piso. Un error de 200 000 € es <em>10 veces peor<\u002Fem> que uno de 20 000 €.<\u002Fp>\n          <div class=\"quiz-options\">\n            <button class=\"ix-btn\" data-pick=\"mae\">MAE<\u002Fbutton>\n            <button class=\"ix-btn\" data-pick=\"rmse\">RMSE<\u002Fbutton>\n            <button class=\"ix-btn\" data-pick=\"r2\">R²<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"quiz-feedback\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"quiz-card\" data-q=\"cv\">\n          <p class=\"quiz-q\">03 · Tienes solo 200 muestras y quieres una medida fiable del rendimiento.<\u002Fp>\n          <div class=\"quiz-options\">\n            <button class=\"ix-btn\" data-pick=\"split\">Train/test 80-20<\u002Fbutton>\n            <button class=\"ix-btn\" data-pick=\"cv\">5-fold cross-validation<\u002Fbutton>\n            <button class=\"ix-btn\" data-pick=\"all\">Entrenar con todo<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"quiz-feedback\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 35 — Cierre -->\n  <section class=\"slide dark\" data-screen-label=\"35 Gracias\">\n    <div class=\"dot-grid\"><\u002Fdiv>\n    <div class=\"chrome-top\"><div class=\"mark\"><div class=\"glyph\"><\u002Fdiv><\u002Fdiv><span>Final · Sesión 05<\u002Fspan><\u002Fdiv>\n    <div class=\"body\" style=\"justify-content: center;\">\n      <div class=\"divider-num\" style=\"margin-bottom: 32px;\">Fin · 05<\u002Fdiv>\n      <h1 class=\"divider-title\">Modelos<br><em>evaluados<\u002Fem>.<\u002Fh1>\n      <p class=\"lead\" style=\"margin-top: 48px; max-width: 1100px; color: var(--accent-2);\">Próxima sesión: despliegue, MLOps y monitorización en producción.<\u002Fp>\n      <p class=\"body-md\" style=\"margin-top: 56px; opacity: 0.7;\">Preguntas, debate o café — en directo o por foro de la asignatura.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"chrome-bottom\"><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script>\nconst UNIR_LOGO = (window.__resources && window.__resources.unirLogo) || \"Logo_UNIR.png\";\n\n(function injectChromeBottom() {\n  const slides = document.querySelectorAll('section.slide');\n  const total = String(slides.length).padStart(2, '0');\n  slides.forEach((slide, i) => {\n    const cb = slide.querySelector('.chrome-bottom');\n    if (cb) {\n      [...cb.querySelectorAll('span')].forEach(s => s.remove());\n      const num = String(i + 1).padStart(2, '0');\n      const left = document.createElement('span');\n      left.className = 'pageno';\n      left.textContent = num + ' / ' + total;\n      const right = document.createElement('span');\n      right.textContent = 'Sesión 05 — Modelado y Evaluación de Modelos';\n      cb.prepend(left);\n      cb.appendChild(right);\n    }\n    if (!slide.querySelector('.unir-logo')) {\n      const img = document.createElement('img');\n      img.className = 'unir-logo';\n      img.src = UNIR_LOGO;\n      img.alt = 'UNIR';\n      slide.appendChild(img);\n    }\n  });\n})();\n<\u002Fscript>\n\n<script>\n// =============================================================\n//   QUIZ — slide 34\n// =============================================================\n(function(){\n  const explain = {\n    recall: 'Recall → pillas a todos los enfermos. Un FN aquí es crítico.',\n    precision: 'Precision → no metes correos buenos en spam por error.',\n    rmse: 'RMSE → eleva al cuadrado, castiga fuerte los errores grandes.',\n    mae: 'MAE → cada error pesa lo mismo. Aquí queremos castigar los gordos.',\n    r2: 'R² → mide qué fracción de la varianza explicas, no la magnitud.',\n    cv: 'Cross-validation → con pocos datos, rotar el test es la mejor opción.',\n    split: 'Con 200 muestras, un único split puede ser muy inestable.',\n    all: 'Sin test → no tienes forma de saber si generaliza. Receta para sobreajustar.',\n    accuracy: 'Si el 99 % son sanos, marcar todo como \"sano\" da 99 % de accuracy. Inútil.'\n  };\n  document.querySelectorAll('.quiz-card').forEach(card => {\n    const correct = card.dataset.q;\n    const fb = card.querySelector('.quiz-feedback');\n    card.querySelectorAll('.ix-btn[data-pick]').forEach(btn => {\n      btn.addEventListener('click', () => {\n        const pick = btn.dataset.pick;\n        card.querySelectorAll('.ix-btn[data-pick]').forEach(b => { b.classList.remove('active','accent'); });\n        btn.classList.add('active');\n        if (pick === correct) {\n          card.classList.remove('wrong');\n          card.classList.add('right');\n          btn.classList.add('accent');\n          fb.className = 'quiz-feedback right';\n          fb.innerHTML = '✓ <strong>Correcto.<\u002Fstrong> ' + explain[correct];\n        } else {\n          card.classList.remove('right');\n          card.classList.add('wrong');\n          fb.className = 'quiz-feedback wrong';\n          fb.innerHTML = '✗ ' + (explain[pick] || '') + ' La buena era: <strong>' + (explain[correct] || correct) + '<\u002Fstrong>';\n        }\n      });\n    });\n  });\n})();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
